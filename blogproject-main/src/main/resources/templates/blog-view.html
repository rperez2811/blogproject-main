<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<main class="max-w-2xl mx-auto p-6">

    <!-- BLOG -->
    <h1 class="text-3xl font-bold mb-2"
        th:text="${blog.name}"></h1>

    <p class="text-gray-600 mb-6"
       th:text="${blog.description}"></p>

    <!-- SIN POSTS -->
    <p th:if="${posts == null or #lists.isEmpty(posts)}"
       class="text-gray-500">
        No hay publicaciones aún
    </p>

    <!-- POSTS -->
    <div class="space-y-6">

        <div th:each="post : ${posts}"
             class="bg-white rounded-xl shadow overflow-hidden">

            <img th:if="${post.imageUrl != null}"
                 th:src="${post.imageUrl}"
                 class="w-full h-[300px] object-cover">

            <div class="p-4">

                <h2 class="text-xl font-bold mb-1"
                    th:text="${post.title}"></h2>

                <p class="text-gray-700 mb-3"
                   th:text="${post.content}"></p>

                <p th:if="${post.createdAt != null}"
                   class="text-xs text-gray-400"
                   th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">
                </p>

            </div>

        </div>

    </div>

</main>

</body>
</html>
